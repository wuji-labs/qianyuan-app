appId: ${HAPPIER_E2E_MOBILE_APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true

- runFlow:
    file: _shared/connectDevClientIfNeeded.yaml

- runFlow:
    file: _shared/configureServerIfNeeded.yaml

- runFlow:
    file: _shared/loginCreateAccount.yaml

- runFlow:
    file: _shared/gotoNewSessionComposer.yaml

- assertVisible:
    id: agent-input-agent-chip
- assertVisible:
    id: agent-input-permission-chip
- assertVisible:
    id: agent-input-session-mode-chip

- tapOn:
    id: new-session-composer-input
- inputText: "MOBILE_E2E_NEW_SESSION_SMOKE"

- assertVisible:
    id: new-session-composer-send
