appId: ${HAPPIER_E2E_MOBILE_APP_ID}
---
- launchApp:
    clearState: true
    clearKeychain: true

- runFlow:
    file: _shared/connectUsingLaunchUrl.yaml

- runFlow:
    file: _shared/connectDevClientIfNeeded.yaml

- openLink: ${HAPPIER_E2E_MOBILE_APP_SCHEME}:///settings/server?auto=1&url=${HAPPIER_E2E_SERVER_URL}

- extendedWaitUntil:
    visible: ".*${HAPPIER_E2E_SERVER_VISIBLE_HOST_PATTERN}.*"
    timeout: 240000

- runFlow:
    file: _shared/dismissExpoDevMenuOverlayMaybe.yaml

- openLink: ${HAPPIER_E2E_MOBILE_APP_SCHEME}:///restore/manual

- extendedWaitUntil:
    visible:
      id: restore-manual-secret-input
    timeout: 240000

- tapOn:
    id: restore-manual-secret-input
- setClipboard: ${HAPPIER_E2E_RESTORE_KEY}
- pasteText
- hideKeyboard
- tapOn:
    id: restore-manual-submit

- extendedWaitUntil:
    visible:
      id: "session-list-item-.*"
    timeout: 240000

- waitForAnimationToEnd:
    timeout: 15000

- tapOn:
    id: "session-list-item-.*"
    index: 0
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 1000

- extendedWaitUntil:
    visible:
      id: "session-cockpit-tabbar-.*"
    timeout: 240000

- waitForAnimationToEnd:
    timeout: 15000
