name: PROMOTE — Branch (fast-forward or reset)

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Target — Source branch to copy FROM"
        required: true
        default: dev
        type: string
      target:
        description: "Target — Target branch to update"
        required: true
        default: main
        type: string
      mode:
        description: "Promotion — Mode"
        required: true
        type: choice
        default: fast_forward
        options:
          - fast_forward
          - reset
      dry_run:
        description: "Safety — Only compute and show what would change (no push)"
        required: true
        default: false
        type: boolean
      allow_reset:
        description: "Safety — Required when mode=reset (rewrites target history)"
        required: true
        default: false
        type: boolean
      confirm:
        description: "Confirm — Type exactly: promote <target> from <source> (or: reset <target> from <source>)"
        required: true
        type: string
  workflow_call:
    inputs:
      source:
        description: "Source branch to copy FROM"
        required: true
        type: string
      target:
        description: "Target branch to update"
        required: true
        type: string
      mode:
        description: "Promotion mode"
        required: true
        type: string
      dry_run:
        description: "Only compute and show what would change (no push)"
        required: false
        default: false
        type: boolean
      allow_reset:
        description: "Required when mode=reset (rewrites target history)"
        required: false
        default: false
        type: boolean
      confirm:
        description: "Type exactly: promote <target> from <source> (or: reset <target> from <source>)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: promote-branch-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  promote:
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Validate inputs
        run: |
          set -euo pipefail
          src="${{ inputs.source }}"
          tgt="${{ inputs.target }}"
          mode="${{ inputs.mode }}"
          confirm="${{ inputs.confirm }}"

          if [ -z "$src" ] || [ -z "$tgt" ]; then
            echo "source and target are required." >&2
            exit 1
          fi

          if [ "$src" = "$tgt" ]; then
            echo "Refusing to promote a branch onto itself ($tgt)." >&2
            exit 1
          fi

          if [ "$mode" = "fast_forward" ]; then
            expected="promote $tgt from $src"
            if [ "$confirm" != "$expected" ]; then
              echo "Confirmation mismatch." >&2
              echo "Expected: $expected" >&2
              echo "Got:      $confirm" >&2
              exit 1
            fi
          elif [ "$mode" = "reset" ]; then
            if [ "${{ inputs.allow_reset }}" != "true" ]; then
              echo "Refusing to reset without allow_reset=true." >&2
              exit 1
            fi
            expected="reset $tgt from $src"
            if [ "$confirm" != "$expected" ]; then
              echo "Confirmation mismatch." >&2
              echo "Expected: $expected" >&2
              echo "Got:      $confirm" >&2
              exit 1
            fi
          else
            echo "Unknown mode: $mode" >&2
            exit 1
          fi

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|preview|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev, preview, or main." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Promote branch (pipeline)
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs promote-branch \
            --source "${{ inputs.source }}" \
            --target "${{ inputs.target }}" \
            --mode "${{ inputs.mode }}" \
            --allow-reset "${{ inputs.allow_reset }}" \
            --confirm "${{ inputs.confirm }}" \
            --summary-file "${GITHUB_STEP_SUMMARY}" \
            ${{ inputs.dry_run && '--dry-run' || '' }}
