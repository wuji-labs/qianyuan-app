name: BUILD — Desktop (Tauri)

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment — Controls config (preview|production)"
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production
      source_ref:
        description: "Source ref — Branch, tag, or SHA to build"
        required: true
        default: dev
        type: string
      publish_release:
        description: "Release — Upload bundles + updater feed to GitHub Releases"
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      publish_release:
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-tauri-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22.x"
  UI_REPO: ${{ github.repository }}

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  resolve_source:
    name: Resolve source ref to SHA
    runs-on: ubuntu-latest
    needs: [release_actor_guard]
    outputs:
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 1

      - name: Resolve source SHA
        id: resolve
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          if [ -z "${source_sha:-}" ]; then
            echo "Unable to resolve source SHA from ref '${{ inputs.source_ref }}'" >&2
            exit 1
          fi
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"

  build:
    name: Build updater artifacts (${{ matrix.platform_key }})
    runs-on: ${{ matrix.os }}
    needs: [resolve_source]
    environment: release-shared
    env:
      HAPPIER_EMBEDDED_POLICY_ENV: ${{ inputs.environment == 'production' && 'production' || 'preview' }}
      # Secrets are set at the job-level so `if:` expressions can gate on `env.*` without referencing
      # `secrets.*` (the `secrets` context is not available in workflow expression contexts).
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_key: linux-x86_64
            tauri_target: ""
          - os: windows-latest
            platform_key: windows-x86_64
            tauri_target: ""
          - os: macos-latest
            platform_key: darwin-aarch64
            tauri_target: aarch64-apple-darwin
          - os: macos-latest
            platform_key: darwin-x86_64
            tauri_target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_source.outputs.source_sha }}
          fetch-depth: 1

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|preview|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev, preview, or main." >&2
              exit 1
              ;;
          esac

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Validate updater public key (production)
        if: inputs.environment == 'production'
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs tauri-validate-updater-pubkey --config-path apps/ui/src-tauri/tauri.conf.json

      - name: Enable Corepack (Yarn)
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Build internal packages (protocol, agents)
        run: yarn -s build:packages

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_target }}

      - name: Cache Rust build (Cargo)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/ui/src-tauri/target
          key: tauri-cargo-${{ runner.os }}-${{ matrix.platform_key }}-${{ hashFiles('apps/ui/src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-cargo-${{ runner.os }}-${{ matrix.platform_key }}-
            tauri-cargo-${{ runner.os }}-

      - name: Import Apple codesigning certificate (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != ''
        run: |
          set -euo pipefail

          keychain_path="${RUNNER_TEMP}/build.keychain-db"
          keychain_password="$(uuidgen)"

          cert_path="${RUNNER_TEMP}/apple-cert.p12"
          echo "${APPLE_CERTIFICATE}" | base64 --decode > "${cert_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          existing_keychains=()
          while IFS= read -r line; do
            existing_keychains+=("${line}")
          done < <(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "${keychain_path}" "${existing_keychains[@]}"

          security import "${cert_path}" -k "${keychain_path}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"

      - name: Resolve Apple signing identity (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != ''
        id: apple_id
        run: |
          set -euo pipefail
          identity="$(security find-identity -v -p codesigning 2>&1 | awk -F '"' '/Developer ID Application:/ { print $2; exit }')"
          if [ -z "${identity:-}" ]; then
            echo "Unable to find Developer ID Application identity after importing certificate." >&2
            security find-identity -v -p codesigning || true
            exit 1
          fi
          echo "identity=${identity}" >> "$GITHUB_OUTPUT"

      - name: Install Linux system dependencies (Tauri)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Compute build version
        id: ver
        run: |
          set -euo pipefail
          ui_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${ui_version:-}" ]; then
            echo "Unable to resolve apps/ui/package.json version" >&2
            exit 1
          fi
          if [ "${{ inputs.environment }}" = "preview" ]; then
            build_version="${ui_version}-preview.${GITHUB_RUN_NUMBER}"
          else
            build_version="${ui_version}"
          fi
          echo "ui_version=${ui_version}" >> "$GITHUB_OUTPUT"
          echo "build_version=${build_version}" >> "$GITHUB_OUTPUT"

      - name: Build desktop updater artifacts
        env:
          CI: "true"
          APP_ENV: ${{ inputs.environment }}
          TAURI_TARGET: ${{ matrix.tauri_target }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_id.outputs.identity }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs tauri-build-updater-artifacts \
            --environment "${{ inputs.environment }}" \
            --build-version "${{ steps.ver.outputs.build_version }}" \
            --tauri-target "${TAURI_TARGET}" \
            --ui-dir "apps/ui"

      - name: Notarize macOS artifacts (updater + DMG) (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER_ID != '' && env.APPLE_API_PRIVATE_KEY != '' && env.TAURI_SIGNING_PRIVATE_KEY != ''
        env:
          TAURI_TARGET: ${{ matrix.tauri_target }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs tauri-notarize-macos-artifacts \
            --ui-dir "apps/ui" \
            --tauri-target "${TAURI_TARGET}"

      - name: Fail when production notarization/signing secrets are missing (macOS)
        if: runner.os == 'macOS' && inputs.environment == 'production' && (env.APPLE_CERTIFICATE == '' || env.APPLE_CERTIFICATE_PASSWORD == '' || env.APPLE_API_KEY_ID == '' || env.APPLE_API_ISSUER_ID == '' || env.APPLE_API_PRIVATE_KEY == '' || env.TAURI_SIGNING_PRIVATE_KEY == '')
        run: |
          echo "Missing required production macOS signing/notarization secrets." >&2
          echo "Required: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, APPLE_API_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY." >&2
          exit 1

      - name: Collect updater artifact + signature
        env:
          PLATFORM_KEY: ${{ matrix.platform_key }}
          UI_VERSION: ${{ steps.ver.outputs.ui_version }}
          ENVIRONMENT: ${{ inputs.environment }}
          TAURI_TARGET: ${{ matrix.tauri_target }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs tauri-collect-updater-artifacts \
            --environment "${ENVIRONMENT}" \
            --platform-key "${PLATFORM_KEY}" \
            --ui-version "${UI_VERSION}" \
            --tauri-target "${TAURI_TARGET}" \
            --ui-dir "apps/ui"

      - name: Upload updater assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-updates-${{ matrix.platform_key }}
          path: dist/tauri/updates/${{ matrix.platform_key }}/**
          retention-days: 7

  prepare_assets:
    name: Prepare latest.json + publish assets
    runs-on: ubuntu-latest
    needs: [resolve_source, build]
    outputs:
      ui_version: ${{ steps.meta.outputs.ui_version }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_source.outputs.source_sha }}
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Compute build metadata
        id: meta
        run: |
          set -euo pipefail
          ui_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${ui_version:-}" ]; then
            echo "Unable to resolve apps/ui/package.json version" >&2
            exit 1
          fi
          echo "ui_version=${ui_version}" >> "$GITHUB_OUTPUT"
          echo "target_sha=${{ needs.resolve_source.outputs.source_sha }}" >> "$GITHUB_OUTPUT"

      - name: Download updater assets artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-updates-*
          path: dist/tauri/updates
          merge-multiple: true

      - name: Generate latest.json
        env:
          REPO: ${{ env.UI_REPO }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs tauri-prepare-assets \
            --environment "${ENVIRONMENT}" \
            --ui-version "${{ steps.meta.outputs.ui_version }}" \
            --repo "${REPO}" \
            --artifacts-dir "dist/tauri/updates" \
            --publish-dir "dist/tauri/publish"

      - name: Upload publish assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-desktop-assets
          path: dist/tauri/publish/**
          retention-days: 7

  publish_preview:
    if: ${{ inputs.publish_release == true && inputs.environment == 'preview' }}
    needs: [prepare_assets]
    uses: ./.github/workflows/publish-ui-release.yml
    secrets: inherit
    with:
      tag: ui-desktop-preview
      title: Happier UI Desktop Preview
      target_sha: ${{ needs.prepare_assets.outputs.target_sha }}
      prerelease: true
      rolling_tag: true
      generate_notes: false
      notes: Rolling preview build.
      assets_artifact: ui-desktop-assets
      assets_artifact_path: dist/ui-desktop-assets
      assets_dir: dist/ui-desktop-assets/ui-desktop-preview
      clobber: true

  publish_stable_release:
    if: ${{ inputs.publish_release == true && inputs.environment == 'production' }}
    needs: [prepare_assets]
    uses: ./.github/workflows/publish-ui-release.yml
    secrets: inherit
    with:
      tag: ui-desktop-v${{ needs.prepare_assets.outputs.ui_version }}
      title: Happier UI Desktop v${{ needs.prepare_assets.outputs.ui_version }}
      target_sha: ${{ needs.prepare_assets.outputs.target_sha }}
      prerelease: false
      rolling_tag: false
      generate_notes: true
      assets_artifact: ui-desktop-assets
      assets_artifact_path: dist/ui-desktop-assets
      assets_dir: dist/ui-desktop-assets/ui-desktop-v
      clobber: true

  publish_stable_feed:
    if: ${{ inputs.publish_release == true && inputs.environment == 'production' }}
    needs: [prepare_assets]
    uses: ./.github/workflows/publish-ui-release.yml
    secrets: inherit
    with:
      tag: ui-desktop-stable
      title: Happier UI Desktop Stable
      target_sha: ${{ needs.prepare_assets.outputs.target_sha }}
      prerelease: false
      rolling_tag: true
      generate_notes: false
      notes: Stable update feed.
      assets_artifact: ui-desktop-assets
      assets_artifact_path: dist/ui-desktop-assets
      assets_dir: dist/ui-desktop-assets/ui-desktop-stable
      clobber: true
