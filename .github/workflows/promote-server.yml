name: PROMOTE — Server (deploy branch)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: choice
        options:
          - preview
          - production
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: true
        default: false
        type: boolean
      run_tests:
        description: "Checks — Run apps/server tests before promoting"
        required: true
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→preview, production→main."
        required: true
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: true
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (server)"
        required: true
        default: none
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      publish_runtime_release:
        description: "Publish — Build + publish server runtime binaries/manifests to GitHub Releases (server-preview/server-stable)"
        required: true
        default: false
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: string
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: false
        default: false
        type: boolean
      run_tests:
        description: "Checks — Run apps/server tests before promoting"
        required: false
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→preview, production→main."
        required: false
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: false
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (server)"
        required: false
        default: none
        type: string
      publish_runtime_release:
        description: "Publish — Build + publish server runtime binaries/manifests to GitHub Releases (server-preview/server-stable)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: promote-server-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  promote:
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Resolve source ref
        id: resolve
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          src="${{ inputs.source_ref }}"
          if [ "$src" = "auto" ]; then
            if [ "$env_name" = "preview" ]; then
              src="preview"
            else
              src="main"
            fi
          fi

          # Guardrails: allow using non-default source ref only when explicitly confirmed.
          if [ "$env_name" = "production" ] && [ "$src" != "main" ] && [ "${{ inputs.allow_cross_promote }}" != "true" ]; then
            echo "Refusing to promote '$src' to production without allow_cross_promote=true." >&2
            exit 1
          fi

          # Bumps require a real branch target we can push back to.
          if [ "${{ inputs.bump }}" != "none" ] && [ "$src" != "main" ] && [ "$src" != "preview" ] && [ "$src" != "dev" ]; then
            echo "Refusing to bump versions when source_ref is not a branch (main/preview/dev). Set bump=none or use a branch." >&2
            exit 1
          fi

          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|preview|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev, preview, or main." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ inputs.environment == 'production' && 'production' || 'preview' }}
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Run release contract tests
        run: yarn -s test:release:contracts

      - name: Verify installer assets are synced
        run: node scripts/pipeline/run.mjs release-sync-installers --check

      - name: Setup Bun
        if: inputs.publish_runtime_release == true
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install minisign (signing + verification)
        if: inputs.publish_runtime_release == true
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y minisign
          command -v minisign >/dev/null

      - name: Bump server version (source ref)
        id: bump_server
        run: |
          set -euo pipefail
          out="$(node scripts/pipeline/run.mjs release-bump-version --component server --bump "${{ inputs.bump }}")"
          if [ "$out" = "SKIP" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "version=$out" >> "$GITHUB_OUTPUT"

      - name: Run server tests
        if: inputs.run_tests
        run: yarn --cwd apps/server test

      - name: Commit + push version bump (pipeline)
        if: steps.bump_server.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          src="${{ steps.resolve.outputs.ref }}"
          node scripts/pipeline/run.mjs github-commit-and-push \
            --paths "apps/server/package.json,packages/relay-server/package.json" \
            --allow-missing false \
            --message "chore(release): bump server to v${{ steps.bump_server.outputs.version }}" \
            --push-ref "${src}" \
            --push-mode auto

      - name: Bootstrap minisign
        if: inputs.publish_runtime_release == true
        uses: ./.github/actions/bootstrap-minisign

      - name: Build server runtime binaries
        if: inputs.publish_runtime_release == true
        env:
          CHANNEL: ${{ inputs.environment == 'production' && 'stable' || 'preview' }}
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSPHRASE: ${{ secrets.MINISIGN_PASSPHRASE }}
        run: |
          set -euo pipefail
          version="$(node -p 'require("./apps/server/package.json").version' | tr -d '\n')"
          node scripts/pipeline/run.mjs release-build-server-binaries \
            --channel="${CHANNEL}" \
            --version="${version}"

      - name: Generate server manifests
        if: inputs.publish_runtime_release == true
        env:
          CHANNEL: ${{ inputs.environment == 'production' && 'stable' || 'preview' }}
          ASSETS_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ inputs.environment == 'production' && 'server-stable' || 'server-preview' }}
        run: |
          set -euo pipefail
          version="$(node -p 'require("./apps/server/package.json").version' | tr -d '\n')"
          node scripts/pipeline/run.mjs release-publish-manifests \
            --product=happier-server \
            --channel="${CHANNEL}" \
            --version="${version}" \
            --artifacts-dir="dist/release-assets/server" \
            --out-dir="dist/release-assets/server/manifests" \
            --assets-base-url="${ASSETS_BASE_URL}" \
            --commit-sha="$(git rev-parse HEAD)" \
            --workflow-run-id="${{ github.run_id }}"

      - name: Verify server release artifacts
        if: inputs.publish_runtime_release == true
        env:
          CHANNEL: ${{ inputs.environment == 'production' && 'stable' || 'preview' }}
        run: |
          set -euo pipefail
          version="$(node -p 'require("./apps/server/package.json").version' | tr -d '\n')"
          test -f "dist/release-assets/server/checksums-happier-server-v${version}.txt"
          test -f "dist/release-assets/server/checksums-happier-server-v${version}.txt.minisig"
          test -f "dist/release-assets/server/manifests/v1/happier-server/${CHANNEL}/latest.json"

      - name: Cryptographic verify server release artifacts
        if: inputs.publish_runtime_release == true
        run: |
          set -euo pipefail
          version="$(node -p 'require("./apps/server/package.json").version' | tr -d '\n')"
          node scripts/pipeline/run.mjs release-verify-artifacts \
            --artifacts-dir="dist/release-assets/server" \
            --checksums="dist/release-assets/server/checksums-happier-server-v${version}.txt" \
            --public-key="scripts/release/installers/happier-release.pub" \
            --skip-smoke

      - name: Publish rolling server release assets
        if: inputs.publish_runtime_release == true
        env:
          CHANNEL: ${{ inputs.environment == 'production' && 'stable' || 'preview' }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="$(node -p 'require("./apps/server/package.json").version' | tr -d '\n')"
          tag="server-preview"
          title="Happier Server Preview"
          prerelease="true"
          if [ "${CHANNEL}" = "stable" ]; then
            tag="server-stable"
            title="Happier Server Stable"
            prerelease="false"
          fi
          node scripts/pipeline/run.mjs github-publish-release \
            --tag "${tag}" \
            --title "${title}" \
            --target-sha "$(git rev-parse HEAD)" \
            --prerelease "${prerelease}" \
            --rolling-tag "true" \
            --generate-notes "false" \
            --notes "Rolling ${CHANNEL} server runtime release." \
            --assets-dir "dist/release-assets/server" \
            --clobber "true" \
            --prune-assets "true"

      - name: Publish versioned stable server release assets
        if: inputs.publish_runtime_release == true && inputs.environment == 'production'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="$(node -p 'require("./apps/server/package.json").version' | tr -d '\n')"
          tag="server-v${version}"
          title="Happier Server v${version}"
          node scripts/pipeline/run.mjs github-publish-release \
            --tag "${tag}" \
            --title "${title}" \
            --target-sha "$(git rev-parse HEAD)" \
            --prerelease "false" \
            --rolling-tag "false" \
            --generate-notes "true" \
            --assets-dir "dist/release-assets/server" \
            --clobber "true"

      - name: Resolve deploy branch SHA (before)
        id: deploy_before
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref="deploy/${{ inputs.environment }}/server"
          sha="$(gh api "repos/${{ github.repository }}/git/ref/heads/${ref}" --jq .object.sha 2>/dev/null || true)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Promote source ref to deploy branch
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs promote-deploy-branch \
            --deploy-environment "${{ inputs.environment }}" \
            --component server \
            --sha "$(git rev-parse HEAD)" \
            --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Resolve deploy branch SHA (after)
        id: deploy_after
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref="deploy/${{ inputs.environment }}/server"
          sha="$(gh api "repos/${{ github.repository }}/git/ref/heads/${ref}" --jq .object.sha 2>/dev/null || true)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy webhook(s) (force_deploy, no branch change)
        if: inputs.force_deploy && steps.deploy_before.outputs.sha == steps.deploy_after.outputs.sha
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CF_WEBHOOK_DEPLOY_CLIENT_ID: ${{ secrets.CF_WEBHOOK_DEPLOY_CLIENT_ID }}
          CF_WEBHOOK_DEPLOY_CLIENT_SECRET: ${{ secrets.CF_WEBHOOK_DEPLOY_CLIENT_SECRET }}
          DEPLOY_WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL != '' && vars.DEPLOY_WEBHOOK_URL || secrets.DEPLOY_WEBHOOK_URL }}
          HAPPIER_SERVER_API_DEPLOY_WEBHOOKS: ${{ vars.HAPPIER_SERVER_API_DEPLOY_WEBHOOKS != '' && vars.HAPPIER_SERVER_API_DEPLOY_WEBHOOKS || secrets.HAPPIER_SERVER_API_DEPLOY_WEBHOOKS }}
          HAPPIER_SERVER_WORKER_DEPLOY_WEBHOOKS: ${{ vars.HAPPIER_SERVER_WORKER_DEPLOY_WEBHOOKS != '' && vars.HAPPIER_SERVER_WORKER_DEPLOY_WEBHOOKS || secrets.HAPPIER_SERVER_WORKER_DEPLOY_WEBHOOKS }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs deploy \
            --deploy-environment "${{ inputs.environment }}" \
            --component "server" \
            --repository "${{ github.repository }}" \
            --ref-name "deploy/${{ inputs.environment }}/server"

      - name: Deploy note
        run: |
          set -euo pipefail
          echo "Deployment is triggered automatically by pushes to deploy/${{ inputs.environment }}/server." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- deploy_branch_sha: \`${{ steps.deploy_after.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
