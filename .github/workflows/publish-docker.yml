name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: true
        default: "preview"
        type: choice
        options:
          - dev
          - preview
          - stable
      source_ref:
        description: "Source ref to build from (auto => dev:dev, preview:preview, stable:main)"
        required: true
        default: auto
        type: string
      push_latest:
        description: "Also push the floating channel tag (dev, preview, or latest)"
        required: true
        default: true
        type: boolean
      registries:
        description: "Comma-separated registries to push to (dockerhub,ghcr)"
        required: true
        default: "dockerhub,ghcr"
        type: string
      build_relay:
        description: "Build/push relay-server image"
        required: true
        default: true
        type: boolean
      build_dev_box:
        description: "Build/push dev-box image"
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      source_ref:
        required: false
        default: auto
        type: string
      push_latest:
        required: false
        default: true
        type: boolean
      registries:
        required: false
        default: dockerhub,ghcr
        type: string
      build_relay:
        required: false
        default: true
        type: boolean
      build_dev_box:
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  publish:
    name: Build and push images
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Resolve channel metadata
        id: channel_meta
        shell: bash
        run: |
          set -euo pipefail
          node scripts/pipeline/release/resolve-public-release-channel-meta.mjs \
            --channel "${{ inputs.channel }}" \
            --source-ref "${{ inputs.source_ref }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Guard stable channel
        if: ${{ inputs.channel == 'stable' && steps.channel_meta.outputs.source_ref != 'main' }}
        run: |
          echo "Stable Docker publishing must build from main (resolved ref: '${{ steps.channel_meta.outputs.source_ref }}')." >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.channel_meta.outputs.source_ref }}
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # Prefer a long-lived PAT when org/package settings prevent GitHub Actions tokens from publishing to GHCR.
          # Fall back to the release bot GitHub App token, then GITHUB_TOKEN.
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || 'x-access-token' }}
          password: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}

      - name: Build & push images (pipeline)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          GHCR_NAMESPACE: ghcr.io/happier-dev
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || 'x-access-token' }}
          GHCR_TOKEN: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || steps.app_token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs docker-publish \
            --channel "${{ inputs.channel }}" \
            --registries "${{ inputs.registries }}" \
            --push-latest "${{ inputs.push_latest }}" \
            --build-relay "${{ inputs.build_relay }}" \
            --build-dev-box "${{ inputs.build_dev_box }}"

      - name: Update Docker Hub README (relay-server)
        if: ${{ inputs.build_relay && inputs.channel != 'dev' }}
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: happierdev/relay-server
          readme-filepath: docker/dockerhub/relay-server.md
          short-description: Self-host the Happier Server (Docker image)

      - name: Update Docker Hub README (dev-box)
        if: ${{ inputs.build_dev_box && inputs.channel != 'dev' }}
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: happierdev/dev-box
          readme-filepath: docker/dockerhub/dev-box.md
          short-description: Happier dev box (CLI + daemon in Docker)
