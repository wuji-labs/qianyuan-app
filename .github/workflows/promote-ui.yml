name: PROMOTE — UI (deploy branch + optional Expo)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: choice
        options:
          - preview
          - production
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: true
        default: false
        type: boolean
      run_tests:
        description: "Checks — Run apps/ui tests before promoting"
        required: true
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→preview, production→main."
        required: true
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: true
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (app)"
        required: true
        default: none
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      deploy_web:
        description: "Deploy — Promote deploy/<env>/ui (web deploy on push)"
        required: true
        default: true
        type: boolean
      expo_action:
        description: "Deploy (Expo) — Action (requires EXPO_TOKEN secret)"
        required: true
        default: none
        type: choice
        options:
          - none
          - ota
          - native
          - native_submit
      expo_builder:
        description: "Deploy (Expo) — Native build runner (eas_cloud uses Expo build servers; eas_local builds on GitHub runners)"
        required: true
        default: eas_cloud
        type: choice
        options:
          - eas_cloud
          - eas_local
      expo_profile:
        description: "Deploy (Expo) — EAS build profile (auto: preview→preview, production→production). Use *-apk profiles to produce installable Android APKs and publish to GitHub Releases."
        required: true
        default: auto
        type: choice
        options:
          - auto
          - preview
          - preview-apk
          - production
          - production-apk
      expo_platform:
        description: "Deploy (Expo) — Native build platform"
        required: true
        default: all
        type: choice
        options:
          - ios
          - android
          - all
      expo_update_message:
        description: "Deploy (Expo) — Optional EAS update message (ota); defaults to a generated message when unset"
        required: false
        default: ""
        type: string
      desktop_build:
        description: "Deploy (Desktop) — Build Tauri desktop bundles (macOS/Windows/Linux)"
        required: true
        default: false
        type: boolean
      desktop_publish_release:
        description: "Deploy (Desktop) — Upload desktop bundles to GitHub Releases"
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: string
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: false
        default: false
        type: boolean
      run_tests:
        description: "Checks — Run apps/ui tests before promoting"
        required: false
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→preview, production→main."
        required: false
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: false
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (app)"
        required: false
        default: none
        type: string
      deploy_web:
        description: "Deploy — Promote deploy/<env>/ui (web deploy on push)"
        required: false
        default: true
        type: boolean
      expo_action:
        description: "Deploy (Expo) — Action (requires EXPO_TOKEN secret)"
        required: false
        default: none
        type: string
      expo_builder:
        description: "Deploy (Expo) — Native build runner (eas_cloud uses Expo build servers; eas_local builds on GitHub runners)"
        required: false
        default: eas_cloud
        type: string
      expo_profile:
        description: "Deploy (Expo) — EAS build profile (auto: preview→preview, production→production). Use *-apk profiles to produce installable Android APKs and publish to GitHub Releases."
        required: false
        default: auto
        type: string
      expo_platform:
        description: "Deploy (Expo) — Native build platform"
        required: false
        default: all
        type: string
      expo_update_message:
        description: "Deploy (Expo) — Optional EAS update message (ota); defaults to a generated message when unset"
        required: false
        default: ""
        type: string
      desktop_build:
        description: "Deploy (Desktop) — Build Tauri desktop bundles (macOS/Windows/Linux)"
        required: false
        default: false
        type: boolean
      desktop_publish_release:
        description: "Deploy (Desktop) — Upload desktop bundles to GitHub Releases"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: promote-ui-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  promote:
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
    outputs:
      source_ref: ${{ steps.resolve.outputs.ref }}
      release_sha: ${{ steps.release_sha.outputs.sha }}
      expo_profile: ${{ steps.expo_profile.outputs.profile }}
      deploy_ref: ${{ steps.deploy_meta.outputs.ref }}
      deploy_sha: ${{ steps.deploy_meta.outputs.sha }}
    steps:
      - name: Resolve source ref
        id: resolve
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          src="${{ inputs.source_ref }}"
          if [ "$src" = "auto" ]; then
            if [ "$env_name" = "preview" ]; then
              src="preview"
            else
              src="main"
            fi
          fi

          # Guardrails: allow using non-default source ref only when explicitly confirmed.
          if [ "$env_name" = "production" ] && [ "$src" != "main" ] && [ "${{ inputs.allow_cross_promote }}" != "true" ]; then
            echo "Refusing to promote '$src' to production without allow_cross_promote=true." >&2
            exit 1
          fi

          # Bumps require a real branch target we can push back to.
          if [ "${{ inputs.bump }}" != "none" ] && [ "$src" != "main" ] && [ "$src" != "preview" ] && [ "$src" != "dev" ]; then
            echo "Refusing to bump versions when source_ref is not a branch (main/preview/dev). Set bump=none or use a branch." >&2
            exit 1
          fi

          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|preview|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev, preview, or main." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ inputs.environment == 'production' && 'production' || 'preview' }}
          # Speed up installs for mobile-only and unit-test flows (desktop/web builds happen elsewhere).
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Bump app version (source ref)
        id: bump_app
        run: |
          set -euo pipefail
          out="$(node scripts/pipeline/run.mjs release-bump-version --component app --bump "${{ inputs.bump }}")"
          if [ "$out" = "SKIP" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "version=$out" >> "$GITHUB_OUTPUT"

      - name: Run app tests
        if: inputs.run_tests
        run: |
          yarn --cwd apps/ui test:unit
          yarn --cwd apps/ui test:integration

      - name: Commit + push version bump (pipeline)
        if: steps.bump_app.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          src="${{ steps.resolve.outputs.ref }}"
          node scripts/pipeline/run.mjs github-commit-and-push \
            --paths "apps/ui/package.json,apps/ui/app.config.js,apps/ui/src-tauri" \
            --allow-missing true \
            --message "chore(release): bump app to v${{ steps.bump_app.outputs.version }}" \
            --push-ref "${src}" \
            --push-mode auto

      - name: Capture release SHA
        id: release_sha
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Expo OTA update
        if: inputs.expo_action == 'ota'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs expo-ota \
            --environment "${{ inputs.environment }}" \
            --message "${{ inputs.expo_update_message }}" \
            --eas-cli-version "${EAS_CLI_VERSION}"

      - name: Resolve Expo build profile
        id: expo_profile
        if: inputs.expo_action == 'native' || inputs.expo_action == 'native_submit'
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          action="${{ inputs.expo_action }}"
          builder="${{ inputs.expo_builder }}"
          profile="${{ inputs.expo_profile }}"

          if [ "${profile}" = "auto" ]; then
            profile="${env_name}"
          fi

          echo "profile=${profile}" >> "$GITHUB_OUTPUT"
          {
            echo "### Expo"
            echo "- action: \`${action}\`"
            echo "- builder: \`${builder}\`"
            echo "- environment: \`${env_name}\`"
            echo "- build profile: \`${profile}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Expo native build + optional APK release + optional submit (pipeline)
        if: ${{ (inputs.expo_action == 'native' || inputs.expo_action == 'native_submit') && inputs.expo_builder == 'eas_cloud' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: ${{ inputs.environment }}
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs ui-mobile-release \
            --environment "${{ inputs.environment }}" \
            --action "${{ inputs.expo_action }}" \
            --platform "${{ inputs.expo_platform }}" \
            --profile "${{ steps.expo_profile.outputs.profile }}" \
            --build-json "/tmp/eas_build.json" \
            --out-dir "dist/ui-mobile" \
            --eas-cli-version "${EAS_CLI_VERSION}" \
            --release-message "${{ inputs.expo_update_message }}" \
            --secrets-source env

      - name: Resolve deploy branch SHA (before)
        if: inputs.deploy_web
        id: deploy_before
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref="deploy/${{ inputs.environment }}/ui"
          sha="$(gh api "repos/${{ github.repository }}/git/ref/heads/${ref}" --jq .object.sha 2>/dev/null || true)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Promote source ref to deploy branch (web)
        if: inputs.deploy_web
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs promote-deploy-branch \
            --deploy-environment "${{ inputs.environment }}" \
            --component ui \
            --sha "$(git rev-parse HEAD)" \
            --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Resolve deploy branch SHA (after)
        if: inputs.deploy_web
        id: deploy_after
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref="deploy/${{ inputs.environment }}/ui"
          sha="$(gh api "repos/${{ github.repository }}/git/ref/heads/${ref}" --jq .object.sha 2>/dev/null || true)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy webhook(s) (web) (force_deploy, no branch change)
        if: inputs.deploy_web && inputs.force_deploy && steps.deploy_before.outputs.sha == steps.deploy_after.outputs.sha
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CF_WEBHOOK_DEPLOY_CLIENT_ID: ${{ secrets.CF_WEBHOOK_DEPLOY_CLIENT_ID }}
          CF_WEBHOOK_DEPLOY_CLIENT_SECRET: ${{ secrets.CF_WEBHOOK_DEPLOY_CLIENT_SECRET }}
          DEPLOY_WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL != '' && vars.DEPLOY_WEBHOOK_URL || secrets.DEPLOY_WEBHOOK_URL }}
          HAPPIER_UI_DEPLOY_WEBHOOKS: ${{ vars.HAPPIER_UI_DEPLOY_WEBHOOKS != '' && vars.HAPPIER_UI_DEPLOY_WEBHOOKS || secrets.HAPPIER_UI_DEPLOY_WEBHOOKS }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs deploy \
            --deploy-environment "${{ inputs.environment }}" \
            --component "ui" \
            --repository "${{ github.repository }}" \
            --ref-name "deploy/${{ inputs.environment }}/ui"

      - name: Deploy note (web)
        if: inputs.deploy_web
        run: |
          set -euo pipefail
          echo "Web deployment is triggered automatically by pushes to deploy/${{ inputs.environment }}/ui." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- deploy_branch_sha: \`${{ steps.deploy_after.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"

  expo_local_build:
    name: Expo native build (local runners)
    if: ${{ (inputs.expo_action == 'native' || inputs.expo_action == 'native_submit') && inputs.expo_builder == 'eas_local' }}
    needs: [promote]
    permissions:
      contents: read
    uses: ./.github/workflows/build-ui-mobile-local.yml
    secrets: inherit
    with:
      source_ref: ${{ needs.promote.outputs.release_sha }}
      environment: ${{ inputs.environment }}
      platform: ${{ inputs.expo_platform }}
      profile: ${{ needs.promote.outputs.expo_profile }}
      action: ${{ inputs.expo_action == 'native_submit' && 'build_and_submit' || 'build_only' }}
      publish_apk_release: ${{ ((inputs.expo_platform == 'android' || inputs.expo_platform == 'all') && endsWith(needs.promote.outputs.expo_profile, '-apk')) && 'auto' || 'false' }}

  desktop:
    name: Desktop bundles (Tauri)
    if: ${{ inputs.desktop_build == true }}
    needs: [promote]
    permissions:
      contents: write
    uses: ./.github/workflows/build-tauri.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      source_ref: ${{ needs.promote.outputs.release_sha }}
      publish_release: ${{ inputs.desktop_publish_release }}
