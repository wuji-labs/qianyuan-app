name: PROMOTE — Website (deploy branch)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: choice
        options:
          - preview
          - production
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: true
        default: false
        type: boolean
      run_build:
        description: "Checks — Run apps/website build before promoting"
        required: true
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→preview, production→main."
        required: true
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: true
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (website)"
        required: true
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major
  workflow_call:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: string
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: false
        default: false
        type: boolean
      run_build:
        description: "Checks — Run apps/website build before promoting"
        required: false
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→preview, production→main."
        required: false
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: false
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (website)"
        required: false
        default: none
        type: string

permissions:
  contents: read

concurrency:
  group: promote-website-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  promote:
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Resolve source ref
        id: resolve
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          src="${{ inputs.source_ref }}"
          if [ "$src" = "auto" ]; then
            if [ "$env_name" = "preview" ]; then
              src="preview"
            else
              src="main"
            fi
          fi

          # Guardrails: allow using non-default source ref only when explicitly confirmed.
          if [ "$env_name" = "production" ] && [ "$src" != "main" ] && [ "${{ inputs.allow_cross_promote }}" != "true" ]; then
            echo "Refusing to promote '$src' to production without allow_cross_promote=true." >&2
            exit 1
          fi

          # Bumps require a real branch target we can push back to.
          if [ "${{ inputs.bump }}" != "none" ] && [ "$src" != "main" ] && [ "$src" != "preview" ] && [ "$src" != "dev" ]; then
            echo "Refusing to bump versions when source_ref is not a branch (main/preview/dev). Set bump=none or use a branch." >&2
            exit 1
          fi

          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|preview|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev, preview, or main." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Sync installer assets into website public
        id: sync_installers
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs release-sync-installers
          if git diff --quiet -- \
            apps/website/public/install \
            apps/website/public/install.sh \
            apps/website/public/install-preview \
            apps/website/public/install-preview.sh \
            apps/website/public/self-host.sh \
            apps/website/public/self-host \
            apps/website/public/self-host-preview \
            apps/website/public/self-host-preview.sh \
            apps/website/public/install.ps1 \
            apps/website/public/install-preview.ps1 \
            apps/website/public/self-host.ps1 \
            apps/website/public/self-host-preview.ps1 \
            apps/website/public/happier-release.pub; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump website version (source ref)
        id: bump_website
        run: |
          set -euo pipefail
          out="$(node scripts/pipeline/run.mjs release-bump-version --component website --bump "${{ inputs.bump }}")"
          if [ "$out" = "SKIP" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "version=$out" >> "$GITHUB_OUTPUT"

      - name: Build website
        if: inputs.run_build
        run: |
          set -euo pipefail
          yarn workspace @happier-dev/website build

      - name: Commit website release updates (source ref)
        id: commit_changes
        if: steps.bump_website.outputs.skipped != 'true' || steps.sync_installers.outputs.changed == 'true'
        run: |
          set -euo pipefail
          if [ "${{ steps.bump_website.outputs.skipped }}" != "true" ]; then
            message="chore(release): bump website to v${{ steps.bump_website.outputs.version }}"
            if [ "${{ steps.sync_installers.outputs.changed }}" = "true" ]; then
              message="${message} and sync installers"
            fi
          else
            message="chore(release): sync website installers from release sources"
          fi

          src="${{ steps.resolve.outputs.ref }}"
          paths="apps/website/package.json,apps/website/public/install,apps/website/public/install.sh,apps/website/public/install-preview,apps/website/public/install-preview.sh,apps/website/public/self-host.sh,apps/website/public/self-host,apps/website/public/self-host-preview,apps/website/public/self-host-preview.sh,apps/website/public/install.ps1,apps/website/public/install-preview.ps1,apps/website/public/self-host.ps1,apps/website/public/self-host-preview.ps1,apps/website/public/happier-release.pub"
          out="$(node scripts/pipeline/run.mjs github-commit-and-push \
            --paths "${paths}" \
            --allow-missing false \
            --message "${message}" \
            --push-ref "${src}" \
            --push-mode auto)"

          if echo "${out}" | grep -q "DID_COMMIT=true"; then
            echo "did_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "did_commit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve deploy branch SHA (before)
        id: deploy_before
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref="deploy/${{ inputs.environment }}/website"
          sha="$(gh api "repos/${{ github.repository }}/git/ref/heads/${ref}" --jq .object.sha 2>/dev/null || true)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Promote source ref to deploy branch
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs promote-deploy-branch \
            --deploy-environment "${{ inputs.environment }}" \
            --component website \
            --sha "$(git rev-parse HEAD)" \
            --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Resolve deploy branch SHA (after)
        id: deploy_after
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref="deploy/${{ inputs.environment }}/website"
          sha="$(gh api "repos/${{ github.repository }}/git/ref/heads/${ref}" --jq .object.sha 2>/dev/null || true)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy webhook(s) (force_deploy, no branch change)
        if: inputs.force_deploy && steps.deploy_before.outputs.sha == steps.deploy_after.outputs.sha
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CF_WEBHOOK_DEPLOY_CLIENT_ID: ${{ secrets.CF_WEBHOOK_DEPLOY_CLIENT_ID }}
          CF_WEBHOOK_DEPLOY_CLIENT_SECRET: ${{ secrets.CF_WEBHOOK_DEPLOY_CLIENT_SECRET }}
          DEPLOY_WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL != '' && vars.DEPLOY_WEBHOOK_URL || secrets.DEPLOY_WEBHOOK_URL }}
          HAPPIER_WEBSITE_DEPLOY_WEBHOOKS: ${{ vars.HAPPIER_WEBSITE_DEPLOY_WEBHOOKS != '' && vars.HAPPIER_WEBSITE_DEPLOY_WEBHOOKS || secrets.HAPPIER_WEBSITE_DEPLOY_WEBHOOKS }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs deploy \
            --deploy-environment "${{ inputs.environment }}" \
            --component "website" \
            --repository "${{ github.repository }}" \
            --ref-name "deploy/${{ inputs.environment }}/website"

      - name: Deploy note
        run: |
          set -euo pipefail
          echo "Deployment is triggered automatically by pushes to deploy/${{ inputs.environment }}/website." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- deploy_branch_sha: \`${{ steps.deploy_after.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
