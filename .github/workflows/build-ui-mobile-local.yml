name: BUILD — UI Mobile (local runner)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref (branch, tag, or SHA) to build"
        required: false
        default: ""
        type: string
      environment:
        description: "App variant (maps to APP_ENV)"
        required: true
        type: choice
        default: preview
        options:
          - development
          - canary
          - preview
          - production
      platform:
        description: "Native platform to build"
        required: true
        type: choice
        default: all
        options:
          - ios
          - android
          - all
      profile:
        description: "EAS build profile (auto: environment→matching profile)"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - development
          - development-store
          - canary
          - canary-apk
          - preview
          - preview-apk
          - production
          - production-apk
      action:
        description: "Build native binaries, submit store builds, or publish OTA"
        required: true
        type: choice
        default: build_only
        options:
          - build_only
          - build_and_submit
          - ota
      publish_apk_release:
        description: "Deploy (Android APK only) — Publish APK to GitHub Releases (auto publishes only when an APK is produced)"
        required: true
        type: choice
        default: "false"
        options:
          - auto
          - "true"
          - "false"
  workflow_call:
    inputs:
      source_ref:
        required: false
        default: ""
        type: string
      environment:
        required: true
        type: string
      platform:
        required: false
        default: all
        type: string
      profile:
        required: false
        default: auto
        type: string
      action:
        required: false
        default: build_only
        type: string
      publish_apk_release:
        required: false
        default: "false"
        type: string
    secrets:
      EXPO_TOKEN:
        required: false
      APPLE_API_PRIVATE_KEY:
        required: false

permissions:
  contents: read

concurrency:
  group: build-ui-mobile-local-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  validate_expo_token:
    name: Validate EXPO_TOKEN
    if: ${{ inputs.action == 'ota' || inputs.platform == 'all' || inputs.platform == 'android' || inputs.platform == 'ios' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail when EXPO_TOKEN is missing
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN is required for BUILD — UI Mobile (local runner)." >&2
            echo "Set the repository secret EXPO_TOKEN, or call this workflow from a trusted workflow that provides it." >&2
            exit 1
          fi

  validate_apple_api_private_key:
    name: Validate APPLE_API_PRIVATE_KEY (iOS submit)
    if: ${{ inputs.action == 'build_and_submit' && (inputs.environment == 'preview' || inputs.environment == 'production') && (inputs.platform == 'all' || inputs.platform == 'ios') }}
    runs-on: ubuntu-latest
    steps:
      - name: Fail when APPLE_API_PRIVATE_KEY is missing
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.APPLE_API_PRIVATE_KEY }}" ]; then
            echo "APPLE_API_PRIVATE_KEY is required for iOS submit in non-interactive mode." >&2
            echo "Set the repository secret APPLE_API_PRIVATE_KEY, or run via workflow_call from a trusted workflow that provides it." >&2
            exit 1
          fi

  build_android:
    name: Build (android)
    if: ${{ inputs.action != 'ota' && (inputs.platform == 'all' || inputs.platform == 'android') }}
    needs: [release_actor_guard, validate_expo_token]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment == 'canary' && 'preview' || inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PLATFORM: android
      # Local Android release builds can exceed default heap limits during D8 dex merging.
      # Raise heap and reduce concurrency for reliability on GitHub-hosted runners.
      #
      # Key detail: EAS local builds run Gradle in a generated Android project under /tmp, so we can't
      # rely on a checked-in gradle.properties. We instead tune via environment variables.
      #
      # D8 (dex merging) can run in-process via Gradle's Worker API; in that case, it shares the
      # Gradle JVM heap. Disabling the daemon + forcing a single worker reduces peak RSS and avoids
      # frequent OOMs during :app:mergeDexRelease.
      JAVA_TOOL_OPTIONS: -Xmx5g -Dfile.encoding=UTF-8
      GRADLE_OPTS: -Xmx5g -Dfile.encoding=UTF-8 -Dorg.gradle.daemon=false -Dorg.gradle.parallel=false -Dorg.gradle.workers.max=1 -Dkotlin.daemon.jvm.options=-Xmx2g
      ORG_GRADLE_PROJECT_org.gradle.jvmargs: -Xmx5g -Dfile.encoding=UTF-8
      ORG_GRADLE_PROJECT_kotlin.daemon.jvmargs: -Xmx2g
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Create GitHub App token (APK publishing)
        id: app_token
        if: ${{ inputs.publish_apk_release != 'false' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          # Keep builds mobile-focused (desktop/web builds happen elsewhere).
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ (inputs.environment == 'production' && 'production') || ((inputs.environment == 'preview' || inputs.environment == 'canary') && 'preview') || '' }}
        run: yarn install --frozen-lockfile --ignore-engines

      - name: EAS build (local runner) (pipeline)
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs ui-mobile-release \
            --environment "${{ inputs.environment }}" \
            --action native \
            --platform "${EAS_PLATFORM}" \
            --profile "${{ inputs.profile == 'auto' && inputs.environment || inputs.profile }}" \
            --native-build-mode local \
            --build-json "/tmp/eas_build_${EAS_PLATFORM}.json" \
            --out-dir "dist/ui-mobile" \
            --publish-apk-release "${{ inputs.publish_apk_release }}" \
            --secrets-source env

      - name: Upload mobile build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-android
          path: dist/ui-mobile/**
          retention-days: 7

  build_ios:
    name: Build (ios)
    if: ${{ inputs.action != 'ota' && (inputs.platform == 'all' || inputs.platform == 'ios') }}
    needs: [release_actor_guard, validate_expo_token]
    runs-on: macos-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment == 'canary' && 'preview' || inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PLATFORM: ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          # Keep builds mobile-focused (desktop/web builds happen elsewhere).
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ (inputs.environment == 'production' && 'production') || ((inputs.environment == 'preview' || inputs.environment == 'canary') && 'preview') || '' }}
        run: yarn install --frozen-lockfile --ignore-engines

      - name: EAS build (local runner) (pipeline)
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs ui-mobile-release \
            --environment "${{ inputs.environment }}" \
            --action native \
            --platform "${EAS_PLATFORM}" \
            --profile "${{ inputs.profile == 'auto' && inputs.environment || inputs.profile }}" \
            --native-build-mode local \
            --build-json "/tmp/eas_build_${EAS_PLATFORM}.json" \
            --out-dir "dist/ui-mobile" \
            --publish-apk-release false \
            --secrets-source env

      - name: Upload mobile build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-ios
          path: dist/ui-mobile/**
          retention-days: 7

  ota_update:
    name: OTA update
    if: ${{ inputs.action == 'ota' }}
    needs: [release_actor_guard, validate_expo_token]
    runs-on: ubuntu-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment == 'canary' && 'preview' || inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ (inputs.environment == 'production' && 'production') || ((inputs.environment == 'preview' || inputs.environment == 'canary') && 'preview') || '' }}
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Publish OTA via pipeline
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs ui-mobile-release \
            --environment "${{ inputs.environment }}" \
            --action ota \
            --platform all \
            --secrets-source env

  submit_android:
    name: Submit (android)
    if: ${{ inputs.action == 'build_and_submit' && (inputs.environment == 'preview' || inputs.environment == 'production') && (inputs.platform == 'all' || inputs.platform == 'android') }}
    needs: [release_actor_guard, validate_expo_token, build_android]
    runs-on: ubuntu-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment == 'canary' && 'preview' || inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PLATFORM: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Resolve expected build output path
        id: meta
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          platform="${EAS_PLATFORM}"
          profile="${{ inputs.profile }}"
          if [ "${profile}" = "auto" ]; then
            profile="${env_name}"
          fi

          app_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${app_version:-}" ]; then
            echo "Unable to resolve apps/ui version." >&2
            exit 1
          fi

          ext="aab"
          if printf '%s' "${profile}" | grep -q -- '-apk$'; then
            ext="apk"
          fi

          out=""
          if [ "${env_name}" = "production" ]; then
            out="dist/ui-mobile/happier-production-${platform}-v${app_version}.${ext}"
          else
            out="dist/ui-mobile/happier-preview-${platform}.${ext}"
          fi

          echo "out=${out}" >> "$GITHUB_OUTPUT"

      - name: Download mobile build artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-android
          path: .

      - name: Resolve downloaded build artifact path
        id: artifact
        env:
          EAS_BUILD_OUT: ${{ steps.meta.outputs.out }}
        run: |
          set -euo pipefail

          rel="${EAS_BUILD_OUT}"
          artifact_dir="ui-mobile-${{ inputs.environment }}-android"

          candidates=(
            "${GITHUB_WORKSPACE}/${rel}"
            "${GITHUB_WORKSPACE}/${artifact_dir}/${rel}"
          )

          for candidate in "${candidates[@]}"; do
            if [ -f "${candidate}" ]; then
              echo "path=${candidate}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          base="$(basename "${rel}")"
          found="$(find "${GITHUB_WORKSPACE}" -maxdepth 6 -type f -path '*/dist/ui-mobile/*' -name "${base}" -print -quit || true)"
          if [ -n "${found:-}" ] && [ -f "${found}" ]; then
            echo "path=${found}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unable to find downloaded build output for submit." >&2
          echo "Expected (relative): ${rel}" >&2
          echo "Searched (candidates):" >&2
          printf ' - %s\n' "${candidates[@]}" >&2
          echo "Found files under dist/ui-mobile:" >&2
          find "${GITHUB_WORKSPACE}" -maxdepth 6 -type f -path '*/dist/ui-mobile/*' -print >&2 || true
          exit 1

      - name: EAS submit (local binary)
        env:
          SUBMIT_PATH: ${{ steps.artifact.outputs.path }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs expo-submit \
            --environment "${{ inputs.environment }}" \
            --platform "${EAS_PLATFORM}" \
            --path "${SUBMIT_PATH}" \
            --secrets-source env

  submit_ios:
    name: Submit (ios)
    if: ${{ inputs.action == 'build_and_submit' && (inputs.environment == 'preview' || inputs.environment == 'production') && (inputs.platform == 'all' || inputs.platform == 'ios') }}
    needs: [release_actor_guard, validate_expo_token, validate_apple_api_private_key, build_ios]
    runs-on: macos-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment == 'canary' && 'preview' || inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      EAS_PLATFORM: ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Resolve expected build output path
        id: meta
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          platform="${EAS_PLATFORM}"

          app_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${app_version:-}" ]; then
            echo "Unable to resolve apps/ui version." >&2
            exit 1
          fi

          out=""
          if [ "${env_name}" = "production" ]; then
            out="dist/ui-mobile/happier-production-${platform}-v${app_version}.ipa"
          else
            out="dist/ui-mobile/happier-preview-${platform}.ipa"
          fi

          echo "out=${out}" >> "$GITHUB_OUTPUT"

      - name: Download mobile build artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-ios
          path: .

      - name: Resolve downloaded build artifact path
        id: artifact
        env:
          EAS_BUILD_OUT: ${{ steps.meta.outputs.out }}
        run: |
          set -euo pipefail

          rel="${EAS_BUILD_OUT}"
          artifact_dir="ui-mobile-${{ inputs.environment }}-ios"

          candidates=(
            "${GITHUB_WORKSPACE}/${rel}"
            "${GITHUB_WORKSPACE}/${artifact_dir}/${rel}"
          )

          for candidate in "${candidates[@]}"; do
            if [ -f "${candidate}" ]; then
              echo "path=${candidate}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          base="$(basename "${rel}")"
          found="$(find "${GITHUB_WORKSPACE}" -maxdepth 6 -type f -path '*/dist/ui-mobile/*' -name "${base}" -print -quit || true)"
          if [ -n "${found:-}" ] && [ -f "${found}" ]; then
            echo "path=${found}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unable to find downloaded build output for submit." >&2
          echo "Expected (relative): ${rel}" >&2
          echo "Searched (candidates):" >&2
          printf ' - %s\n' "${candidates[@]}" >&2
          echo "Found files under dist/ui-mobile:" >&2
          find "${GITHUB_WORKSPACE}" -maxdepth 6 -type f -path '*/dist/ui-mobile/*' -print >&2 || true
          exit 1

      - name: EAS submit (local binary)
        env:
          SUBMIT_PATH: ${{ steps.artifact.outputs.path }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs expo-submit \
            --environment "${{ inputs.environment }}" \
            --platform "${EAS_PLATFORM}" \
            --path "${SUBMIT_PATH}" \
            --secrets-source env
