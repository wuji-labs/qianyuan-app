name: BUILD — UI Mobile (local runner)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref (branch, tag, or SHA) to build"
        required: false
        default: ""
        type: string
      environment:
        description: "App variant (maps to APP_ENV)"
        required: true
        type: choice
        default: preview
        options:
          - internaldev
          - internalpreview
          - dev
          - preview
          - production
      platform:
        description: "Native platform to build"
        required: true
        type: choice
        default: all
        options:
          - ios
          - android
          - all
      profile:
        description: "EAS build profile (auto: environment→matching profile)"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - internaldev
          - internaldev-store
          - internalpreview
          - internalpreview-apk
          - dev
          - dev-apk
          - preview
          - preview-apk
          - production
          - production-apk
      action:
        description: "Build native binaries, submit store builds, or publish OTA"
        required: true
        type: choice
        default: build_only
        options:
          - build_only
          - build_and_submit
          - ota
      publish_apk_release:
        description: "Deploy (Android APK only) — Publish APK to GitHub Releases (auto publishes only when an APK is produced)"
        required: true
        type: choice
        default: "false"
        options:
          - auto
          - "true"
          - "false"
      android_release_status:
        description: "Deploy (Android store) — EAS submit releaseStatus"
        required: true
        type: choice
        default: draft
        options:
          - draft
          - profile
          - completed
          - halted
          - inProgress
  workflow_call:
    inputs:
      source_ref:
        required: false
        default: ""
        type: string
      environment:
        required: true
        type: string
      platform:
        required: false
        default: all
        type: string
      profile:
        required: false
        default: auto
        type: string
      action:
        required: false
        default: build_only
        type: string
      publish_apk_release:
        required: false
        default: "false"
        type: string
      android_release_status:
        required: false
        default: draft
        type: string
    secrets:
      EXPO_TOKEN:
        required: false
      APPLE_API_PRIVATE_KEY:
        required: false

permissions:
  contents: read

concurrency:
  group: build-ui-mobile-local-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  validate_expo_token:
    name: Validate EXPO_TOKEN
    if: ${{ inputs.action == 'ota' || inputs.platform == 'all' || inputs.platform == 'android' || inputs.platform == 'ios' }}
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Fail when EXPO_TOKEN is missing
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN is required for BUILD — UI Mobile (local runner)." >&2
            echo "Set the repository secret EXPO_TOKEN, or call this workflow from a trusted workflow that provides it." >&2
            exit 1
          fi

  validate_apple_api_private_key:
    name: Validate APPLE_API_PRIVATE_KEY (iOS submit)
    if: ${{ inputs.action == 'build_and_submit' && (inputs.environment == 'dev' || inputs.environment == 'preview' || inputs.environment == 'production') && (inputs.platform == 'all' || inputs.platform == 'ios') }}
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Fail when APPLE_API_PRIVATE_KEY is missing
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.APPLE_API_PRIVATE_KEY }}" ]; then
            echo "APPLE_API_PRIVATE_KEY is required for iOS submit in non-interactive mode." >&2
            echo "Set the repository secret APPLE_API_PRIVATE_KEY, or run via workflow_call from a trusted workflow that provides it." >&2
            exit 1
          fi

  release_notes_assets:
    name: Release notes assets
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release-shared
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents,cli-common,release-runtime,transfers,connection-supervisor"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ (inputs.environment == 'production' && 'production') || ((inputs.environment == 'dev' || inputs.environment == 'preview' || inputs.environment == 'internalpreview') && 'preview') || '' }}
        uses: ./.github/actions/install-yarn-dependencies
        with:
          args: --frozen-lockfile --ignore-engines

      - name: Generate release notes manifest
        run: |
          set -euo pipefail
          yarn --cwd apps/ui tsx sources/scripts/parseReleaseNotes.ts

      - name: Build release notes assets
        run: |
          set -euo pipefail
          node scripts/pipeline/release/release-notes/build-release-notes-assets.mjs \
            --out-dir "dist/release-notes-assets"

      - name: Create release notes assets GitHub App token
        id: release_notes_assets_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: happier-assets
          permission-contents: write

      - name: Publish release notes assets
        env:
          GH_TOKEN: ${{ steps.release_notes_assets_token.outputs.token }}
          GH_REPO: happier-dev/happier-assets
        run: |
          set -euo pipefail
          node scripts/pipeline/release/release-notes/publish-release-notes-assets.mjs \
            --in-dir "dist/release-notes-assets" \
            --repo "happier-dev/happier-assets" \
            --tag "release-notes"

  build_android:
    name: Build (android)
    if: ${{ inputs.action != 'ota' && (inputs.platform == 'all' || inputs.platform == 'android') }}
    needs: [release_actor_guard, validate_expo_token]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PLATFORM: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Create GitHub App token (APK publishing)
        id: app_token
        if: ${{ inputs.publish_apk_release != 'false' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          # Keep builds mobile-focused (desktop/web builds happen elsewhere).
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents,cli-common,release-runtime,transfers,connection-supervisor"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ (inputs.environment == 'production' && 'production') || ((inputs.environment == 'dev' || inputs.environment == 'preview' || inputs.environment == 'internalpreview') && 'preview') || '' }}
        uses: ./.github/actions/install-yarn-dependencies
        with:
          args: --frozen-lockfile --ignore-engines

      - name: EAS build (local runner) (pipeline)
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs ui-mobile-release \
            --environment "${{ inputs.environment }}" \
            --action "${{ inputs.action == 'build_and_submit' && 'native_submit' || 'native' }}" \
            --platform "${EAS_PLATFORM}" \
            --profile "${{ inputs.profile == 'auto' && inputs.environment || inputs.profile }}" \
            --native-build-mode local \
            --build-json "/tmp/eas_build_${EAS_PLATFORM}.json" \
            --out-dir "dist/ui-mobile" \
            --publish-apk-release "${{ inputs.publish_apk_release }}" \
            --android-release-status "${{ inputs.android_release_status }}" \
            --secrets-source env

      - name: Upload mobile build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-android
          path: dist/ui-mobile/**
          retention-days: 7

  build_ios:
    name: Build (ios)
    if: ${{ inputs.action != 'ota' && (inputs.platform == 'all' || inputs.platform == 'ios') }}
    needs: [release_actor_guard, validate_expo_token]
    runs-on: macos-26
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      APP_STORE_CONNECT_PUBLICDEV_EXTERNAL_GROUPS: ${{ vars.APP_STORE_CONNECT_PUBLICDEV_EXTERNAL_GROUPS }}
      APP_STORE_CONNECT_PUBLICDEV_SUBMIT_BETA_REVIEW: ${{ vars.APP_STORE_CONNECT_PUBLICDEV_SUBMIT_BETA_REVIEW }}
      APP_STORE_CONNECT_PUBLICDEV_WAIT_PROCESSING: ${{ vars.APP_STORE_CONNECT_PUBLICDEV_WAIT_PROCESSING }}
      APP_STORE_CONNECT_PUBLICDEV_PROCESSING_TIMEOUT_SECONDS: ${{ vars.APP_STORE_CONNECT_PUBLICDEV_PROCESSING_TIMEOUT_SECONDS }}
      APP_STORE_CONNECT_PREVIEW_EXTERNAL_GROUPS: ${{ vars.APP_STORE_CONNECT_PREVIEW_EXTERNAL_GROUPS }}
      APP_STORE_CONNECT_PREVIEW_SUBMIT_BETA_REVIEW: ${{ vars.APP_STORE_CONNECT_PREVIEW_SUBMIT_BETA_REVIEW }}
      APP_STORE_CONNECT_PREVIEW_WAIT_PROCESSING: ${{ vars.APP_STORE_CONNECT_PREVIEW_WAIT_PROCESSING }}
      APP_STORE_CONNECT_PREVIEW_PROCESSING_TIMEOUT_SECONDS: ${{ vars.APP_STORE_CONNECT_PREVIEW_PROCESSING_TIMEOUT_SECONDS }}
      APP_STORE_CONNECT_PRODUCTION_EXTERNAL_GROUPS: ${{ vars.APP_STORE_CONNECT_PRODUCTION_EXTERNAL_GROUPS }}
      APP_STORE_CONNECT_PRODUCTION_SUBMIT_BETA_REVIEW: ${{ vars.APP_STORE_CONNECT_PRODUCTION_SUBMIT_BETA_REVIEW }}
      APP_STORE_CONNECT_PRODUCTION_WAIT_PROCESSING: ${{ vars.APP_STORE_CONNECT_PRODUCTION_WAIT_PROCESSING }}
      APP_STORE_CONNECT_PRODUCTION_PROCESSING_TIMEOUT_SECONDS: ${{ vars.APP_STORE_CONNECT_PRODUCTION_PROCESSING_TIMEOUT_SECONDS }}
      EAS_PLATFORM: ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Xcode (pin)
        uses: ./.github/actions/setup-xcode
        with:
          xcode_version: "26.2"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          # Keep builds mobile-focused (desktop/web builds happen elsewhere).
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents,cli-common,release-runtime,transfers,connection-supervisor"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ (inputs.environment == 'production' && 'production') || ((inputs.environment == 'dev' || inputs.environment == 'preview' || inputs.environment == 'internalpreview') && 'preview') || '' }}
        uses: ./.github/actions/install-yarn-dependencies
        with:
          args: --frozen-lockfile --ignore-engines

      - name: EAS build (local runner) (pipeline)
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs ui-mobile-release \
            --environment "${{ inputs.environment }}" \
            --action "${{ inputs.action == 'build_and_submit' && 'native_submit' || 'native' }}" \
            --platform "${EAS_PLATFORM}" \
            --profile "${{ inputs.profile == 'auto' && inputs.environment || inputs.profile }}" \
            --native-build-mode local \
            --build-json "/tmp/eas_build_${EAS_PLATFORM}.json" \
            --out-dir "dist/ui-mobile" \
            --publish-apk-release false \
            --android-release-status "${{ inputs.android_release_status }}" \
            --secrets-source env

      - name: Upload mobile build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-ios
          path: dist/ui-mobile/**
          retention-days: 7

  ota_update:
    name: OTA update
    if: ${{ inputs.action == 'ota' }}
    needs: [release_actor_guard, validate_expo_token]
    runs-on: ubuntu-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents,cli-common,release-runtime,transfers,connection-supervisor"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ (inputs.environment == 'production' && 'production') || ((inputs.environment == 'dev' || inputs.environment == 'preview' || inputs.environment == 'internalpreview') && 'preview') || '' }}
        uses: ./.github/actions/install-yarn-dependencies
        with:
          args: --frozen-lockfile --ignore-engines

      - name: Publish OTA via pipeline
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs ui-mobile-release \
            --environment "${{ inputs.environment }}" \
            --action ota \
            --platform all \
            --secrets-source env
