name: PUBLISH — UI Web Bundle (GitHub)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel (preview only for now)"
        required: true
        type: choice
        default: preview
        options:
          - preview
          - stable
      source_ref:
        description: "Source ref to publish (auto => preview:preview, stable:main)"
        required: true
        default: auto
        type: string
      allow_stable:
        description: "Safety — allow publishing stable artifacts (disabled by default)"
        required: true
        default: false
        type: boolean
      release_message:
        description: "Release message — Optional note to include at the top of the GitHub rolling release notes"
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      source_ref:
        required: false
        default: auto
        type: string
      allow_stable:
        required: false
        default: false
        type: boolean
      release_message:
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: publish-ui-web-${{ inputs.channel }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  publish:
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    env:
      APP_ENV: ${{ inputs.channel == 'stable' && 'production' || 'preview' }}
      EXPO_UPDATES_CHANNEL: ${{ inputs.channel == 'stable' && 'production' || 'preview' }}
      HAPPIER_EMBEDDED_POLICY_ENV: ${{ inputs.channel == 'stable' && 'production' || 'preview' }}
    steps:
      - name: Enforce stable publishing gate
        if: ${{ inputs.channel == 'stable' && inputs.allow_stable != true }}
        run: |
          echo "Stable ui web bundle publishing is disabled. Re-run with allow_stable=true if intentional." >&2
          exit 1

      - name: Resolve source ref
        id: resolve_source
        run: |
          set -euo pipefail
          channel="${{ inputs.channel }}"
          src="${{ inputs.source_ref }}"
          if [ "$src" = "auto" ]; then
            if [ "$channel" = "preview" ]; then
              src="preview"
            else
              src="main"
            fi
          fi
          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_source.outputs.ref }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install minisign (signing + verification)
        uses: ./.github/actions/bootstrap-minisign

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Publish UI web bundle (pipeline)
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSPHRASE: ${{ secrets.MINISIGN_PASSPHRASE }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs publish-ui-web \
            --channel "${{ inputs.channel }}" \
            --allow-stable "${{ inputs.allow_stable }}" \
            --release-message "${{ inputs.release_message }}" \
            --run-contracts "true" \
            --check-installers "true"

    permissions:
      contents: write
