name: PROMOTE — Docs (deploy branch)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: choice
        options:
          - preview
          - production
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: true
        default: false
        type: boolean
      run_build:
        description: "Checks — Run docs build before promoting"
        required: true
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→preview, production→main."
        required: true
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: true
        default: false
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: string
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: false
        default: false
        type: boolean
      run_build:
        description: "Checks — Run docs build before promoting"
        required: false
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→preview, production→main."
        required: false
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: promote-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  promote:
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Resolve source ref
        id: resolve
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          src="${{ inputs.source_ref }}"
          if [ "$src" = "auto" ]; then
            if [ "$env_name" = "preview" ]; then
              src="preview"
            else
              src="main"
            fi
          fi

          # Guardrails: allow using non-default source ref only when explicitly confirmed.
          if [ "$env_name" = "production" ] && [ "$src" != "main" ] && [ "${{ inputs.allow_cross_promote }}" != "true" ]; then
            echo "Refusing to promote '$src' to production without allow_cross_promote=true." >&2
            exit 1
          fi

          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|preview|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev, preview, or main." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Resolve deploy branch SHA (before)
        id: deploy_before
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref="deploy/${{ inputs.environment }}/docs"
          sha="$(gh api "repos/${{ github.repository }}/git/ref/heads/${ref}" --jq .object.sha 2>/dev/null || true)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Build docs
        if: inputs.run_build
        run: yarn workspace docs build

      - name: Promote source ref to deploy branch
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs promote-deploy-branch \
            --deploy-environment "${{ inputs.environment }}" \
            --component docs \
            --sha "$(git rev-parse HEAD)" \
            --summary-file "${GITHUB_STEP_SUMMARY}"

      - name: Resolve deploy branch SHA (after)
        id: deploy_after
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ref="deploy/${{ inputs.environment }}/docs"
          sha="$(gh api "repos/${{ github.repository }}/git/ref/heads/${ref}" --jq .object.sha 2>/dev/null || true)"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Trigger deploy webhook(s) (force_deploy, no branch change)
        if: inputs.force_deploy && steps.deploy_before.outputs.sha == steps.deploy_after.outputs.sha
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          CF_WEBHOOK_DEPLOY_CLIENT_ID: ${{ secrets.CF_WEBHOOK_DEPLOY_CLIENT_ID }}
          CF_WEBHOOK_DEPLOY_CLIENT_SECRET: ${{ secrets.CF_WEBHOOK_DEPLOY_CLIENT_SECRET }}
          DEPLOY_WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL != '' && vars.DEPLOY_WEBHOOK_URL || secrets.DEPLOY_WEBHOOK_URL }}
          HAPPIER_DOCS_DEPLOY_WEBHOOKS: ${{ vars.HAPPIER_DOCS_DEPLOY_WEBHOOKS != '' && vars.HAPPIER_DOCS_DEPLOY_WEBHOOKS || secrets.HAPPIER_DOCS_DEPLOY_WEBHOOKS }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs deploy \
            --deploy-environment "${{ inputs.environment }}" \
            --component "docs" \
            --repository "${{ github.repository }}" \
            --ref-name "deploy/${{ inputs.environment }}/docs"

      - name: Deploy note
        run: |
          set -euo pipefail
          echo "Deployment is triggered automatically by pushes to deploy/${{ inputs.environment }}/docs." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- deploy_branch_sha: \`${{ steps.deploy_after.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
