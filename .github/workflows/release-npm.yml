name: RELEASE — npm publish (cli/stack/server)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Target — Release channel"
        required: true
        type: choice
        options:
          - production
          - preview
      source_ref:
        description: "Promotion — Source ref to release from (auto: preview→preview, production→main)"
        required: true
        default: auto
        type: string
      run_tests:
        description: "Checks — Run publish checks/tests before publishing"
        required: true
        default: true
        type: boolean
      publish_cli:
        description: "Publish (CLI) — Publish CLI to npm"
        required: true
        default: true
        type: boolean
      npm_tag:
        description: "Publish (CLI) — npm dist-tag (production: latest, preview: next)"
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
      publish_stack:
        description: "Publish (Stack) — Publish Stack app to npm"
        required: true
        default: false
        type: boolean
      publish_server:
        description: "Publish (Server) — Publish server runner (@happier-dev/relay-server) to npm"
        required: true
        default: false
        type: boolean
      release_message:
        description: "Release message — Optional note to include at the top of GitHub rolling release notes"
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      channel:
        description: "Target — Release channel"
        required: true
        type: string
      source_ref:
        description: "Promotion — Source ref to release from (auto: preview→preview, production→main)"
        required: false
        default: auto
        type: string
      run_tests:
        description: "Checks — Run publish checks/tests before publishing"
        required: false
        default: true
        type: boolean
      publish_cli:
        description: "Publish (CLI) — Publish CLI to npm"
        required: false
        default: true
        type: boolean
      npm_tag:
        description: "Publish (CLI) — npm dist-tag (production: latest, preview: next)"
        required: false
        default: latest
        type: string
      publish_stack:
        description: "Publish (Stack) — Publish Stack app to npm"
        required: false
        default: false
        type: boolean
      publish_server:
        description: "Publish (Server) — Publish server runner (@happier-dev/relay-server) to npm"
        required: false
        default: false
        type: boolean
      release_message:
        description: "Release message — Optional note to include at the top of GitHub rolling release notes"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    # We install Sapling via a Ubuntu 22.04 package; pin runner for compatibility.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  release:
    needs: [release_actor_guard]
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    environment: release-shared
    env:
      HAPPIER_EMBEDDED_POLICY_ENV: ${{ inputs.channel == 'production' && 'production' || 'preview' }}
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
      channel: ${{ steps.meta.outputs.channel }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      cli_version: ${{ steps.meta.outputs.cli_version }}
      stack_version: ${{ steps.meta.outputs.stack_version }}
      server_version: ${{ steps.meta.outputs.server_version }}
    steps:
      - name: Validate inputs
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_NPM_TAG: ${{ inputs.npm_tag }}
          INPUT_PUBLISH_CLI: ${{ inputs.publish_cli }}
          INPUT_PUBLISH_STACK: ${{ inputs.publish_stack }}
          INPUT_PUBLISH_SERVER: ${{ inputs.publish_server }}
        run: |
          set -euo pipefail
          if [ "${INPUT_PUBLISH_CLI}" != "true" ] && [ "${INPUT_PUBLISH_STACK}" != "true" ] && [ "${INPUT_PUBLISH_SERVER}" != "true" ]; then
            echo "At least one of publish_cli, publish_stack, or publish_server must be true." >&2
            exit 1
          fi
          expected_tag="latest"
          if [ "${INPUT_CHANNEL}" = "preview" ]; then
            expected_tag="next"
          fi
          if [ "${INPUT_NPM_TAG}" != "${expected_tag}" ]; then
            echo "npm_tag must be '${expected_tag}' for channel='${INPUT_CHANNEL}' (got '${INPUT_NPM_TAG}')." >&2
            exit 1
          fi

      - name: Resolve source ref
        id: resolve_source
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail
          channel="${INPUT_CHANNEL}"
          src="${INPUT_SOURCE_REF}"
          if [ "$src" = "auto" ]; then
            if [ "$channel" = "preview" ]; then
              src="preview"
            else
              src="main"
            fi
          fi

          if [ "$channel" = "preview" ] && [ "$src" != "preview" ]; then
            echo "Preview releases must run from preview (got source_ref='${src}')." >&2
            exit 1
          fi
          if [ "$channel" = "production" ] && [ "$src" != "main" ]; then
            echo "Production releases must run from main (got source_ref='${src}')." >&2
            exit 1
          fi

          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|preview|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev, preview, or main." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_source.outputs.ref }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Corepack (Yarn 1.22.22)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install minisign (signing + verification)
        uses: ./.github/actions/bootstrap-minisign

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Run release contract tests
        run: yarn -s test:release:contracts

      - name: Verify installer assets are synced
        run: node scripts/pipeline/run.mjs release-sync-installers --check

      - name: Resolve server runner package
        id: server_runner
        run: |
          set -euo pipefail
          dir="packages/relay-server"
          if [ ! -f "${dir}/package.json" ]; then
            echo "No server runner package.json found (expected ${dir}/package.json)." >&2
            exit 1
          fi
          echo "dir=${dir}" >> "$GITHUB_OUTPUT"

      - name: Install Sapling
        if: inputs.publish_cli && inputs.run_tests
        run: |
          set -euo pipefail
          bash scripts/ci/install_sapling_ubuntu22.sh

      - name: Run cli tests
        if: inputs.publish_cli && inputs.run_tests
        run: |
          yarn --cwd apps/cli test:unit
          yarn --cwd apps/cli test:integration

      - name: Run stack tests
        if: inputs.publish_stack && inputs.run_tests
        run: |
          yarn --cwd apps/stack test:unit
          yarn --cwd apps/stack test:integration

      - name: Run server runner tests
        if: inputs.publish_server && inputs.run_tests
        run: yarn --cwd "${{ steps.server_runner.outputs.dir }}" test

      - name: Release metadata
        id: meta
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_PUBLISH_CLI: ${{ inputs.publish_cli }}
          INPUT_PUBLISH_STACK: ${{ inputs.publish_stack }}
          INPUT_PUBLISH_SERVER: ${{ inputs.publish_server }}
          SERVER_RUNNER_DIR: ${{ steps.server_runner.outputs.dir }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "source_ref=${{ steps.resolve_source.outputs.ref }}" >> "$GITHUB_OUTPUT"
          echo "channel=${INPUT_CHANNEL}" >> "$GITHUB_OUTPUT"
          if [ "${INPUT_CHANNEL}" = "preview" ]; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

          versions_json="{}"
          if [ "${INPUT_CHANNEL}" = "preview" ]; then
            versions_json="$(node scripts/pipeline/run.mjs npm-set-preview-versions \
              --publish-cli "${INPUT_PUBLISH_CLI}" \
              --publish-stack "${INPUT_PUBLISH_STACK}" \
              --publish-server "${INPUT_PUBLISH_SERVER}" \
              --server-runner-dir "${SERVER_RUNNER_DIR}" \
              --write false)"
          fi

          if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then
            if [ "${INPUT_CHANNEL}" = "preview" ]; then
              cli_version="$(node -e 'const raw=process.argv[1]; const v=JSON.parse(raw); process.stdout.write(String(v.cli||\"\"));' "${versions_json}")"
            else
              cli_version="$(node -p 'require("./apps/cli/package.json").version' | tr -d '\n')"
            fi
            echo "cli_version=${cli_version}" >> "$GITHUB_OUTPUT"
          else
            echo "cli_version=SKIP" >> "$GITHUB_OUTPUT"
          fi

          if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then
            if [ "${INPUT_CHANNEL}" = "preview" ]; then
              stack_version="$(node -e 'const raw=process.argv[1]; const v=JSON.parse(raw); process.stdout.write(String(v.stack||\"\"));' "${versions_json}")"
            else
              stack_version="$(node -p 'require("./apps/stack/package.json").version' | tr -d '\n')"
            fi
            echo "stack_version=${stack_version}" >> "$GITHUB_OUTPUT"
          else
            echo "stack_version=SKIP" >> "$GITHUB_OUTPUT"
          fi

          if [ "${INPUT_PUBLISH_SERVER}" = "true" ]; then
            if [ "${INPUT_CHANNEL}" = "preview" ]; then
              server_version="$(node -e 'const raw=process.argv[1]; const v=JSON.parse(raw); process.stdout.write(String(v.server||\"\"));' "${versions_json}")"
            else
              server_version="$(node -p 'require("./" + process.env.SERVER_RUNNER_DIR + "/package.json").version' | tr -d '\n')"
            fi
            echo "server_version=${server_version}" >> "$GITHUB_OUTPUT"
          else
            echo "server_version=SKIP" >> "$GITHUB_OUTPUT"
          fi

      - name: Bootstrap minisign
        uses: ./.github/actions/bootstrap-minisign

      - name: Build CLI binaries
        if: inputs.publish_cli
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSPHRASE: ${{ secrets.MINISIGN_PASSPHRASE }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs release-build-cli-binaries \
            --channel="${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}" \
            --version="${{ steps.meta.outputs.cli_version }}"

      - name: Generate CLI manifests
        if: inputs.publish_cli
        env:
          ASSETS_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.channel == 'production' && 'cli-stable' || 'cli-preview' }}
          MANIFEST_CHANNEL: ${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs release-publish-manifests \
            --product=happier \
            --channel="${MANIFEST_CHANNEL}" \
            --version="${{ steps.meta.outputs.cli_version }}" \
            --artifacts-dir="dist/release-assets/cli" \
            --out-dir="dist/release-assets/cli/manifests" \
            --assets-base-url="${ASSETS_BASE_URL}" \
            --commit-sha="${{ steps.meta.outputs.sha }}" \
            --workflow-run-id="${{ github.run_id }}"

      - name: Verify CLI release artifacts
        if: inputs.publish_cli
        env:
          RELEASE_CHANNEL: ${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.cli_version }}"
          test -f "dist/release-assets/cli/checksums-happier-v${version}.txt"
          test -f "dist/release-assets/cli/checksums-happier-v${version}.txt.minisig"
          test -f "dist/release-assets/cli/manifests/v1/happier/${RELEASE_CHANNEL}/latest.json"

      - name: Cryptographic verify CLI release artifacts
        if: inputs.publish_cli
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.cli_version }}"
          node scripts/pipeline/run.mjs release-verify-artifacts \
            --artifacts-dir="dist/release-assets/cli" \
            --checksums="dist/release-assets/cli/checksums-happier-v${version}.txt" \
            --public-key="scripts/release/installers/happier-release.pub" \
            --skip-smoke

      - name: npm pack (pipeline)
        if: inputs.publish_cli || inputs.publish_stack || inputs.publish_server
        env:
          SERVER_RUNNER_DIR: ${{ steps.server_runner.outputs.dir }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs npm-release \
            --channel "${{ inputs.channel }}" \
            --publish-cli "${{ inputs.publish_cli }}" \
            --publish-stack "${{ inputs.publish_stack }}" \
            --publish-server "${{ inputs.publish_server }}" \
            --server-runner-dir "${SERVER_RUNNER_DIR}" \
            --run-tests "${{ inputs.run_tests }}" \
            --mode pack

      - name: Upload npm pack artifact (cli)
        if: inputs.publish_cli
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-cli
          path: dist/release-assets/cli
          if-no-files-found: error

      - name: Build hstack binaries
        if: inputs.publish_stack
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSPHRASE: ${{ secrets.MINISIGN_PASSPHRASE }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs release-build-hstack-binaries \
            --channel="${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}" \
            --version="${{ steps.meta.outputs.stack_version }}"

      - name: Generate hstack manifests
        if: inputs.publish_stack
        env:
          ASSETS_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.channel == 'production' && 'stack-stable' || 'stack-preview' }}
          MANIFEST_CHANNEL: ${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs release-publish-manifests \
            --product=hstack \
            --channel="${MANIFEST_CHANNEL}" \
            --version="${{ steps.meta.outputs.stack_version }}" \
            --artifacts-dir="dist/release-assets/stack" \
            --out-dir="dist/release-assets/stack/manifests" \
            --assets-base-url="${ASSETS_BASE_URL}" \
            --commit-sha="${{ steps.meta.outputs.sha }}" \
            --workflow-run-id="${{ github.run_id }}"

      - name: Verify hstack release artifacts
        if: inputs.publish_stack
        env:
          RELEASE_CHANNEL: ${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.stack_version }}"
          test -f "dist/release-assets/stack/checksums-hstack-v${version}.txt"
          test -f "dist/release-assets/stack/checksums-hstack-v${version}.txt.minisig"
          test -f "dist/release-assets/stack/manifests/v1/hstack/${RELEASE_CHANNEL}/latest.json"

      - name: Cryptographic verify hstack release artifacts
        if: inputs.publish_stack
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.stack_version }}"
          node scripts/pipeline/run.mjs release-verify-artifacts \
            --artifacts-dir="dist/release-assets/stack" \
            --checksums="dist/release-assets/stack/checksums-hstack-v${version}.txt" \
            --public-key="scripts/release/installers/happier-release.pub" \
            --skip-smoke

      - name: Upload npm pack artifact (stack)
        if: inputs.publish_stack
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-stack
          path: dist/release-assets/stack
          if-no-files-found: error

      - name: Upload npm pack artifact (server runner)
        if: inputs.publish_server
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-server
          path: dist/release-assets/server
          if-no-files-found: error

      - name: Step summary
        if: always()
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_PUBLISH_CLI: ${{ inputs.publish_cli }}
          INPUT_PUBLISH_STACK: ${{ inputs.publish_stack }}
          INPUT_PUBLISH_SERVER: ${{ inputs.publish_server }}
        run: |
          npm_tag="${{ steps.meta.outputs.npm_tag }}"
          cli_version="${{ steps.meta.outputs.cli_version }}"
          stack_version="${{ steps.meta.outputs.stack_version }}"
          server_version="${{ steps.meta.outputs.server_version }}"
          [ -n "${npm_tag}" ] || npm_tag="(unavailable)"
          [ -n "${cli_version}" ] || cli_version="(unavailable)"
          [ -n "${stack_version}" ] || stack_version="(unavailable)"
          [ -n "${server_version}" ] || server_version="(unavailable)"

          {
            echo "### npm publish"
            echo ""
            echo "- source ref: \`${{ steps.meta.outputs.source_ref }}\`"
            echo "- channel: \`${INPUT_CHANNEL}\`"
            echo "- npm dist-tag: \`${npm_tag}\`"
            if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then
              echo "- cli: \`${cli_version}\`"
            fi
            if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then
              echo "- stack: \`${stack_version}\`"
            fi
            if [ "${INPUT_PUBLISH_SERVER}" = "true" ]; then
              echo "- server runner: \`${server_version}\`"
            fi
            echo ""
            echo "### GitHub Releases (mirror)"
            echo ""
            if [ "${INPUT_CHANNEL}" = "preview" ]; then
              if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then echo "- \`cli-preview\` (rolling prerelease)"; fi
              if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then echo "- \`stack-preview\` (rolling prerelease)"; fi
            else
              if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then echo "- \`cli-v${cli_version}\`"; fi
              if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then echo "- \`stack-v${stack_version}\`"; fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish-cli:
    name: npm publish (cli)
    if: ${{ inputs.publish_cli == true && needs.release.result == 'success' }}
    needs: [release_actor_guard, release]
    runs-on: ubuntu-22.04
    environment: release-shared
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download npm pack artifact (cli)
        uses: actions/download-artifact@v4
        with:
          name: npm-pack-cli
          path: .

      - name: Setup Node (npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: npm publish (cli tarball) (pipeline)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs npm-publish \
            --channel "${{ inputs.channel }}" \
            --tarball-dir "dist/release-assets/cli"

  publish-stack:
    name: npm publish (stack)
    if: ${{ inputs.publish_stack == true && needs.release.result == 'success' }}
    needs: [release_actor_guard, release]
    runs-on: ubuntu-22.04
    environment: release-shared
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download npm pack artifact (stack)
        uses: actions/download-artifact@v4
        with:
          name: npm-pack-stack
          path: .

      - name: Setup Node (npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: npm publish (stack tarball) (pipeline)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs npm-publish \
            --channel "${{ inputs.channel }}" \
            --tarball-dir "dist/release-assets/stack"

  publish-server-runner:
    name: npm publish (server runner)
    if: ${{ inputs.publish_server == true && needs.release.result == 'success' }}
    needs: [release_actor_guard, release]
    runs-on: ubuntu-22.04
    environment: release-shared
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download npm pack artifact (server runner)
        uses: actions/download-artifact@v4
        with:
          name: npm-pack-server
          path: .

      - name: Setup Node (npm publish)
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: npm publish (server runner tarball) (pipeline)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/pipeline/run.mjs npm-publish \
            --channel "${{ inputs.channel }}" \
            --tarball-dir "dist/release-assets/server"

  mirror-cli-stable:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.cli_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: cli-v${{ needs.release.outputs.cli_version }}
      title: Happier CLI v${{ needs.release.outputs.cli_version }}
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: false
      generate_notes: true
      clobber: true
      assets_artifact: npm-pack-cli
      assets_artifact_path: dist/release-assets/cli
      assets_dir: dist/release-assets/cli
      release_message: ${{ inputs.release_message }}

  mirror-cli-stable-rolling:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.cli_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: cli-stable
      title: Happier CLI Stable
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: true
      generate_notes: false
      notes: "Rolling stable build (npm dist-tag: latest)."
      clobber: true
      prune_assets: true
      assets_artifact: npm-pack-cli
      assets_artifact_path: dist/release-assets/cli
      assets_dir: dist/release-assets/cli
      release_message: ${{ inputs.release_message }}

  mirror-cli-preview:
    if: ${{ needs.release.outputs.channel == 'preview' && needs.release.outputs.cli_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: cli-preview
      title: Happier CLI Preview
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: true
      rolling_tag: true
      generate_notes: false
      notes: "Rolling preview build (npm dist-tag: next)."
      clobber: true
      prune_assets: true
      assets_artifact: npm-pack-cli
      assets_artifact_path: dist/release-assets/cli
      assets_dir: dist/release-assets/cli
      release_message: ${{ inputs.release_message }}

  mirror-stack-stable:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.stack_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: stack-v${{ needs.release.outputs.stack_version }}
      title: Happier Stack v${{ needs.release.outputs.stack_version }}
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: false
      generate_notes: true
      clobber: true
      assets_artifact: npm-pack-stack
      assets_artifact_path: dist/release-assets/stack
      assets_dir: dist/release-assets/stack
      release_message: ${{ inputs.release_message }}

  mirror-stack-stable-rolling:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.stack_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: stack-stable
      title: Happier Stack Stable
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: true
      generate_notes: false
      notes: "Rolling stable build (npm dist-tag: latest)."
      clobber: true
      prune_assets: true
      assets_artifact: npm-pack-stack
      assets_artifact_path: dist/release-assets/stack
      assets_dir: dist/release-assets/stack
      release_message: ${{ inputs.release_message }}

  mirror-stack-preview:
    if: ${{ needs.release.outputs.channel == 'preview' && needs.release.outputs.stack_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: stack-preview
      title: Happier Stack Preview
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: true
      rolling_tag: true
      generate_notes: false
      notes: "Rolling preview build (npm dist-tag: next)."
      clobber: true
      prune_assets: true
      assets_artifact: npm-pack-stack
      assets_artifact_path: dist/release-assets/stack
      assets_dir: dist/release-assets/stack
      release_message: ${{ inputs.release_message }}
